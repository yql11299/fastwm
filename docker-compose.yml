# ===========================================
# Docker Compose 配置 - 证件水印处理系统
# ===========================================

services:
  # 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fastwm-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev-only-secret-change-in-production}
    volumes:
      - ./data/users:/app/data/users
      - ./data/documents:/app/data/documents
      - ./data/exports:/app/data/exports
      - ./data/backgrounds:/app/data/backgrounds
      - ./fonts:/app/fonts:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务 (Nginx)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fastwm-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy