# ===========================================
# Docker Compose 配置 - 证件水印处理系统
# ===========================================

services:
  # 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fastwm-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 容器内的路径（固定）
      - FONTS_PATH=/app/fonts
      - USERS_PATH=/app/data/users
      - DOCUMENTS_PATH=/app/documents
      - EXPORTS_PATH=/app/data/exports
      - BACKGROUNDS_PATH=/app/data/backgrounds
    volumes:
      # 宿主机的绝对路径映射到容器内路径
      - ${FONTS_HOST_PATH}:/app/fonts:ro
      - ${USERS_HOST_PATH}:/app/data/users
      - ${DOCUMENTS_HOST_PATH}:/app/documents:ro
      - ${EXPORTS_HOST_PATH}:/app/data/exports
      - ${BACKGROUNDS_HOST_PATH}:/app/data/backgrounds
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务 (Nginx)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fastwm-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy