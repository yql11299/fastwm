# ===========================================
# Docker Compose 配置 - 证件水印处理系统
# ===========================================

# 使用方法：
# 1. 直接修改端口映射以避免与其他服务冲突
# 2. 运行: docker-compose up -d

services:
  # 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fastwm-server
    restart: unless-stopped
    # 端口映射：宿主端口:容器端口
    # 如 3001:3000 表示宿主 3001 映射到容器 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      # 持久化数据目录
      - ./data/users:/app/data/users
      - ./data/documents:/app/data/documents
      - ./data/exports:/app/data/exports
      - ./data/backgrounds:/app/data/backgrounds
      # 字体文件目录
      - ./fonts:/app/fonts:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务 (Nginx)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fastwm-client
    restart: unless-stopped
    # 端口映射：宿主端口:容器端口
    # 默认 8080 避免占用标准 80 端口
    # 如需使用 80 端口，改为 "80:80" 并确保无其他服务占用
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy